kind = "web"
previewPath = "/streamlit/"
title = "MATIS Streamlit"
version = "1.0.0"
id = "artifacts/matis-streamlit"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/streamlit/" ]
localPort = 21791

[services.development]
run = "streamlit run /home/runner/workspace/artifacts/matis-streamlit/app.py --server.port 21791 --server.headless true --server.baseUrlPath /streamlit"

[services.env]
PORT = "21791"

kind = "web"
previewPath = "/"
title = "MATIS — Multi-Agent Test Automation"
version = "1.0.0"
id = "artifacts/matis"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25765

[services.development]
run = "pnpm --filter @workspace/matis run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/matis", "run", "build" ]
publicDir = "artifacts/matis/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25765"
BASE_PATH = "/"
